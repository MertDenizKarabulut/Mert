<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lara & Mert Yapılacaklar</title>
<link href="[fonts.googleapis.com](https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap)" rel="stylesheet">

<style>
:root{
  --bg: linear-gradient(135deg,#ff9a9e,#fad0c4);
  --card-bg:white;
  --text:#333;
  --accent:#ff6b81;
}
body.dark{
  --bg:#121212;
  --card-bg:#1f1f1f;
  --text:#eee;
  --accent:#ff99a4;
}
html,body{margin:0;padding:0;width:100%;height:100%;}
body{
  font-family:'Poppins',sans-serif;
  background:var(--bg);
  color:var(--text);
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
  transition:.3s background;
}
.header{margin-top:25px;text-align:center;}
.container{
  margin-top:20px;background:var(--card-bg);width:95%;max-width:520px;
  padding:20px;border-radius:22px;box-shadow:0 10px 30px rgba(0,0,0,0.15);
}
.title{text-align:center;font-size:24px;margin-bottom:15px;}
.controls{display:flex;flex-direction:column;gap:10px;margin-bottom:15px;}
.row{display:flex;gap:10px;flex-wrap:wrap;}
input,select{
  padding:12px;border-radius:10px;border:1px solid #ccc;font-size:15px;flex:1;outline:none;
}
button{padding:12px 18px;border:none;border-radius:10px;
  background:var(--accent);color:white;font-weight:600;font-size:15px;cursor:pointer;}
button:active{transform:scale(.97);}
ul{list-style:none;margin:0;padding:0;}
li{
  background:rgba(255,255,255,0.05);
  padding:12px;margin-bottom:10px;border-radius:12px;
  display:flex;justify-content:space-between;align-items:center;
}
body:not(.dark) li{background:#fafafa;}
.meta{font-size:12px;color:#888;}
.completed span{text-decoration:line-through;color:#aaa;}
.delete{background:#ff4757;}
.stats{text-align:center;margin-top:10px;}
footer{margin-top:auto;padding:20px;text-align:center;font-size:14px;}
.toggle-dark{position:fixed;top:15px;right:20px;background:var(--accent);border:none;border-radius:50%;
width:46px;height:46px;color:white;font-size:18px;cursor:pointer;}
/* Giriş ekranı */
#welcome{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;
  z-index:9999;color:white;
}
.login-box{
  background:#fff;color:#333;padding:25px;border-radius:15px;width:90%;max-width:350px;
  box-shadow:0 5px 25px rgba(0,0,0,.3);text-align:center;
}
.login-box input{width:100%;margin-bottom:10px;padding:10px;border-radius:8px;border:1px solid #ccc;}
.login-box button{width:100%;}
#loginMsg{min-height:18px;}
.heart-pop{position:fixed;font-size:28px;animation:pop 1s ease-out forwards;pointer-events:none;}
@keyframes pop{0%{transform:scale(.3) translateY(0);opacity:1;}100%{transform:scale(1.4) translateY(-80px);opacity:0;}}
.fadeOut{animation:fadeOut .4s ease forwards;}
@keyframes fadeOut{from{opacity:1;}to{opacity:0;}}
@media(max-width:480px){
  .container{padding:15px;}
  input,select,button{font-size:14px;}
  .title{font-size:20px;}
  li{flex-direction:column;align-items:flex-start;gap:4px;}
  .right{align-self:flex-end;}
}
</style>
</head>

<body>

<!-- Şifreli giriş -->
<div id="welcome">
  <div class="login-box">
    <h2>Giriş Yap</h2>
    <input id="username" placeholder="Kullanıcı (Lara / Mert)">
    <input id="password" type="password" placeholder="Şifre">
    <button id="loginBtn">Giriş</button>
    <p id="loginMsg" style="color:red;font-size:13px;"></p>
  </div>
</div>

<button class="toggle-dark" id="darkBtn">☀️</button>

<div class="header">
  <h1 id="titleEmoji">💜 Lara & Mert</h1>
  <p>Birlikte yapılacaklar listesi</p>
</div>

<div class="container">
  <div class="title">Etkinlik Ekle</div>
  <div class="controls">
    <div class="row">
      <input id="taskInput" placeholder="Etkinlik yaz...">
      <select id="userSelect">
        <option value="Mert">Mert</option>
        <option value="Lara">Lara</option>
      </select>
    </div>
    <div class="row">
      <input type="date" id="dateInput">
      <button id="addBtn">Ekle</button>
    </div>
  </div>
  <ul id="taskList"></ul>
  <div class="stats" id="stats"></div>
</div>

<footer>Laracım seni çok seviyorum 💖</footer>

<script type="module">
import { initializeApp } from "[gstatic.com](https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js)";
import { getDatabase, ref, set, onValue, remove, get, push } from "[gstatic.com](https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js)";

const firebaseConfig = {
  apiKey: "AIzaSyAKIRNUmXwey9nddXFLhWpEfPK_C7pQgz0",
  authDomain: "mert-lara-todolist.firebaseapp.com",
  databaseURL: "[mert-lara-todolist-default-rtdb.firebaseio.com](https://mert-lara-todolist-default-rtdb.firebaseio.com)",
  projectId: "mert-lara-todolist",
  storageBucket: "mert-lara-todolist.appspot.com",
  messagingSenderId: "928762008645",
  appId: "1:928762008645:web:dc52035d52f1ce99f4ff2c",
  measurementId: "G-QSDTEGL8PB"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let activeUser = "";
const users = { "Lara":"060326", "Mert":"060326" };

/* ---- GİRİŞ ---- */
let activeUser = "";
const users = { "Lara": "060326", "Mert": "060326" };

// Kod modül içinde olduğu için script yüklendikten sonra direkt çalışsın:
const loginBtn = document.getElementById("loginBtn");

if (loginBtn) {
  loginBtn.addEventListener("click", () => {
    const u = document.getElementById("username").value.trim();
    const p = document.getElementById("password").value.trim();
    const msg = document.getElementById("loginMsg");

    // Giriş kontrolü
    if (users[u] && users[u] === p) {
      // Ekranı kapat
      const welcome = document.getElementById("welcome");
      welcome.classList.add("fadeOut");
      setTimeout(() => {
        welcome.remove(); // display none yerine tamamen kaldır
      }, 400);

      activeUser = u;

      if (u === "Lara") {
        document.getElementById("titleEmoji").innerHTML = "💗 Lara & Mert";
        heartExplosion();
      }

      msg.textContent = "";
    } else {
      msg.textContent = "Hatalı kullanıcı veya şifre!";
    }
  });
}


/* ---- KARANLIK MOD ---- */
const darkBtn=document.getElementById("darkBtn");
darkBtn.onclick=()=>{
  document.body.classList.toggle("dark");
  darkBtn.textContent=document.body.classList.contains("dark")?"🌙":"☀️";
};

/* ---- HEART EFFECT ---- */
function heartExplosion(){
  for(let i=0;i<25;i++){
    let h=document.createElement("div");
    h.className="heart-pop";
    h.textContent="❤️";
    h.style.left=(window.innerWidth/2)+"px";
    h.style.top=(window.innerHeight/2)+"px";
    document.body.appendChild(h);
    setTimeout(()=>h.remove(),1000);
  }
}

/* ---- GÖREV EKLE ---- */
document.getElementById("addBtn").onclick=()=>{
  const text=document.getElementById("taskInput").value.trim();
  const user=document.getElementById("userSelect").value;
  const date=document.getElementById("dateInput").value;
  if(!text) return;
  const newRef=push(ref(db,"tasks"));
  set(newRef,{text,user,date,done:false});
  if(user==="Lara") heartExplosion();
  document.getElementById("taskInput").value="";
};

/* ---- GÖREVLER ---- */
function render(tasks){
  const list=document.getElementById("taskList");
  const stats=document.getElementById("stats");
  list.innerHTML="";

  const all=Object.entries(tasks||{}).map(([k,v])=>({key:k,...v}));
  all.sort((a,b)=>{
    if(!a.date) return 1; if(!b.date) return -1;
    return new Date(a.date)-new Date(b.date);
  });

  let done=0;
  all.forEach(task=>{
    if(task.done) done++;
    const li=document.createElement("li");
    const left=document.createElement("div");
    left.className="task";
    if(task.done) left.classList.add("completed");
    const span=document.createElement("span");
    span.textContent=task.text;
    const meta=document.createElement("div");
    meta.className="meta";
    meta.textContent=`Ekleyen: ${task.user} • Tarih: ${task.date||"—"}`;
    left.appendChild(span);left.appendChild(meta);
    const right=document.createElement("div");
    right.className="right";
    const check=document.createElement("input");
    check.type="checkbox";check.checked=task.done;
    check.onclick=()=>toggleTask(task.key);
    const del=document.createElement("button");
    del.textContent="Sil";del.className="delete";
    del.onclick=()=>remove(ref(db,"tasks/"+task.key));
    right.appendChild(check);right.appendChild(del);
    li.appendChild(left);li.appendChild(right);
    list.appendChild(li);
  });
  stats.textContent=`Toplam: ${all.length} | Tamamlanan: ${done}`;
}

function toggleTask(key){
  const doneRef=ref(db,"tasks/"+key+"/done");
  get(doneRef).then(snap=>set(doneRef,!snap.val()));
}
onValue(ref(db,"tasks"),snap=>render(snap.val()));
</script>
</body>
</html>
