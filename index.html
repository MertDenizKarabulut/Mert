<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Lara & Mert Yapılacaklar</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
html, body{margin:0;padding:0;width:100%;height:100%;}
body{
  font-family:'Poppins',sans-serif;
  min-height:100vh;
  background:linear-gradient(135deg,#ff9a9e,#fad0c4);
  display:flex;
  flex-direction:column;
  align-items:center;
}
.header{margin-top:30px;text-align:center;color:#333;padding:0 20px;}
.container{
  margin-top:20px;
  background:white;
  width:550px;
  max-width:95%;
  padding:20px;
  border-radius:22px;
  box-shadow:0 15px 40px rgba(0,0,0,0.15);
}
.title{text-align:center;margin-bottom:15px;font-size:26px;}
.controls{display:flex;flex-direction:column;gap:10px;margin-bottom:15px;}
.row{display:flex;gap:10px;flex-wrap:wrap;}
input, select{
  padding:15px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:15px;
  flex:1;
}
button{
  padding:15px;
  border:none;
  border-radius:12px;
  background:#ff6b81;
  color:white;
  font-weight:600;
  cursor:pointer;
  font-size:15px;
}
button:active{transform:scale(.97);}
ul{list-style:none;margin:0;padding:0;}
li{
  background:#fafafa;
  padding:14px;
  border-radius:14px;
  margin-bottom:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
.meta{font-size:12px;color:#777;}
.completed span{text-decoration:line-through;color:#aaa;}
.delete{background:#ff4757;}
.stats{text-align:center;margin-top:10px;}
footer{margin-top:auto;padding:20px;text-align:center;}

.heart-pop{
  position:fixed;
  font-size:30px;
  animation:pop 1s ease-out forwards;
  pointer-events:none;
}
@keyframes pop{
  0%{transform:scale(0.3) translateY(0);opacity:1;}
  100%{transform:scale(1.4) translateY(-80px);opacity:0;}
}
</style>
</head>

<body>

<div class="header">
<h1>💜 Lara & Mert</h1>
<p>Birlikte yapılacaklar listesi</p>
</div>

<div class="container">
<div class="title">Etkinlik Ekle</div>

<div class="controls">
  <div class="row">
    <input id="taskInput" placeholder="Etkinlik yaz...">
    <select id="userSelect">
      <option value="Mert">Mert</option>
      <option value="Lara">Lara</option>
    </select>
  </div>

  <div class="row">
    <input type="date" id="dateInput">
    <button id="addBtn">Ekle</button>
  </div>
</div>

<ul id="taskList"></ul>
<div class="stats" id="stats"></div>
</div>

<footer>Laracım seni çok seviyorum</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove, get, push } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAKIRNUmXwey9nddXFLhWpEfPK_C7pQgz0",
  authDomain: "mert-lara-todolist.firebaseapp.com",
  databaseURL: "https://mert-lara-todolist-default-rtdb.firebaseio.com",
  projectId: "mert-lara-todolist",
  storageBucket: "mert-lara-todolist.appspot.com",
  messagingSenderId: "928762008645",
  appId: "1:928762008645:web:dc52035d52f1ce99f4ff2c",
  measurementId: "G-QSDTEGL8PB"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* Bildirim izni */
if ("Notification" in window) {
  Notification.requestPermission();
}

/* Lara görev eklemişse ekrana kalp çıkar */
function heartPop() {
  const h = document.createElement("div");
  h.className = "heart-pop";
  h.textContent = "❤️";
  h.style.left = (window.innerWidth / 2 - 20) + "px";
  h.style.top = (window.innerHeight / 2 - 20) + "px";
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),1000);
}

/* Görev yaklaşınca bildirim gönder */
function checkNotifications(tasks){
  const now = new Date();

  Object.values(tasks || {}).forEach(task=>{
    if(!task.date) return;

    const diff = (new Date(task.date) - now) / (1000*60*60*24);

    if(diff <= 1 && diff > 0){   // 24 saat kaldıysa
      if(Notification.permission === "granted"){
        new Notification("Yaklaşan Görev", {
          body: `${task.text} (${task.user}) yarın!`,
          icon: "https://cdn-icons-png.flaticon.com/512/833/833472.png"
        });
      }
    }
  });
}

/* Görev ekleme */
document.getElementById("addBtn").onclick = () => {
  const text = document.getElementById("taskInput").value.trim();
  const user = document.getElementById("userSelect").value;
  const date = document.getElementById("dateInput").value;

  if (!text) return;

  const newRef = push(ref(db, "tasks"));
  set(newRef, { text, user, date, done: false });

  if (user === "Lara") heartPop();  // Lara eklediyse kalp çıksın

  document.getElementById("taskInput").value = "";
};

/* Liste çizimi */
function render(tasks){
  const list = document.getElementById("taskList");
  const stats = document.getElementById("stats");
  list.innerHTML = "";

  let done = 0;

  Object.entries(tasks || {}).forEach(([key, task])=>{
    if(task.done) done++;

    const li = document.createElement("li");

    const t = document.createElement("div");
    t.className = "task";
    if(task.done) t.classList.add("completed");

    const name = document.createElement("span");
    name.textContent = task.text;

    const meta = document.createElement("div");
    meta.className = "meta";
    meta.textContent = `Ekleyen: ${task.user} • Tarih: ${task.date || '—'}`;

    t.appendChild(name);
    t.appendChild(meta);

    const right = document.createElement("div");

    const check = document.createElement("input");
    check.type = "checkbox";
    check.checked = task.done;
    check.onclick = () => toggleTask(key);

    const del = document.createElement("button");
    del.textContent = "Sil";
    del.className = "delete";
    del.onclick = () => remove(ref(db,"tasks/"+key));

    right.appendChild(check);
    right.appendChild(del);

    li.appendChild(t);
    li.appendChild(right);

    list.appendChild(li);
  });

  stats.textContent = `Toplam görev: ${Object.keys(tasks || {}).length} • Tamamlanan: ${done}`;

  checkNotifications(tasks);
}

/* Tamamlandı değişimi */
function toggleTask(key) {
  const doneRef = ref(db, "tasks/" + key + "/done");
  get(doneRef).then(snap =>{
    set(doneRef, !snap.val());
  });
}

/* Firebase dinleyici */
onValue(ref(db,"tasks"), snap => {
  render(snap.val());
});
</script>

</body>
</html>
